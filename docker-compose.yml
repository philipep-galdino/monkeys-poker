services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: pokerclub
      POSTGRES_USER: pokerclub
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pokerclub}
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokerclub"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pokerclub:${DB_PASSWORD:-pokerclub}@db:5432/pokerclub
    ports:
      - "8000:8000"
    command: >
      sh -c "sleep 3 && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - api

volumes:
  pgdata:
