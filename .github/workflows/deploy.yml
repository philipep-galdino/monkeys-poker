name: Deploy to production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Deploy to server
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          # Strip any stray whitespace from secrets (guards against trailing newline in GH secret)
          SERVER_HOST="$(echo -n "$SERVER_HOST" | tr -d '[:space:]')"
          SERVER_USER="$(echo -n "$SERVER_USER" | tr -d '[:space:]')"

          # Setup SSH
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST"

          # Pull latest code on the server (force-sync, discarding any local changes)
          $SSH_CMD "cd ~/monkeys-poker && git fetch origin main && git reset --hard origin/main"

          # Sync the built frontend dist to the server
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            frontend/dist/ \
            "${SERVER_USER}@${SERVER_HOST}:/home/${SERVER_USER}/monkeys-poker/frontend/dist/"

          # Rebuild and restart containers
          $SSH_CMD "cd ~/monkeys-poker && sudo docker compose up -d --build api && sudo docker compose exec -T api alembic upgrade head && sudo docker compose restart nginx"

          # Cleanup
          rm -f ~/.ssh/deploy_key
